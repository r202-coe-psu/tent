services:
  couchdb:
    container_name: tent-couchdb-staging
    image: couchdb:3.5
    environment:
      COUCHDB_USER: ${COUCHDB_USER}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD}
    volumes:
      - /mnt/tent-data/couchdb/data:/opt/couchdb/data
    ports:
      - "${COUCHDB_BIND_IP:-127.0.0.1}:${COUCHDB_PORT:-5984}:5984"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5984/_up"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  mongodb:
    container_name: tent-mongodb-staging
    image: mongo:7
    volumes:
      - /mnt/tent-data/mongodb/data:/data/db
    # No host port — internal Docker network only
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  worker:
    container_name: tent-worker-staging
    build:
      context: .
      dockerfile: worker/Dockerfile
    depends_on:
      couchdb:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      COUCHDB_URL: http://couchdb:5984
      COUCHDB_USER: ${COUCHDB_USER}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/tentdb}
    restart: unless-stopped

  fastapi:
    container_name: tent-fastapi-staging
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "${FASTAPI_BIND_IP:-127.0.0.1}:${FASTAPI_PORT:-9000}:9000"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      APP_ENV: prod
      DATABASE_URI: ${DATABASE_URI:-mongodb://mongodb:27017/tentdb}
      SECRET_KEY: ${SECRET_KEY}
      EXTERNAL_API_SECRET: ${EXTERNAL_API_SECRET}
    restart: unless-stopped

  frontend:
    container_name: tent-frontend-staging
    image: tent/frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        PUBLIC_APP_TITLE: ${PUBLIC_APP_TITLE:-Tent}
        PUBLIC_COUCHDB_URL: ${PUBLIC_ORIGIN:-http://localhost}
        PUBLIC_COUCH_PROXY: /couch
    ports:
      - "${FRONTEND_BIND_IP:-127.0.0.1}:${FRONTEND_PORT:-3000}:3000"
    environment:
      # adapter-node requires ORIGIN in production
      ORIGIN: ${PUBLIC_ORIGIN:-http://localhost}
      # Server-only — never bundled into the browser
      COUCHDB_ADMIN_URL: http://${COUCHDB_USER}:${COUCHDB_PASSWORD}@couchdb:5984
    depends_on:
      couchdb:
        condition: service_healthy
    restart: unless-stopped
