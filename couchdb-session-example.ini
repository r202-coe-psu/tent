; CouchDB session configuration override
; Mounted read-only into /opt/couchdb/etc/local.d/ via docker-compose.

[chttpd_auth]
; Session cookie lifetime in seconds (CouchDB default is 600 = 10 minutes).
; 86400 = 24 hours
timeout = 86400

; Persist the cookie across browser restarts.
allow_persistent_cookies = true