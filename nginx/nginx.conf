server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    # Proxy /couch → CouchDB (keeps session cookie same-origin)
    location /couch/ {
        proxy_pass http://couchdb:5984/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect http://localhost/ /couch/;
    }

    # Public plane → FastAPI. Browser calls /public-api/public/v1/*; strip the
    # gateway prefix so FastAPI still sees /public/v1/*. SPA /public/* and BFF
    # /api/* stay on SvelteKit (Vite mirrors this in dev).
    location /public-api/ {
        rewrite ^/public-api/(.*)$ /$1 break;
        proxy_pass http://fastapi:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else → SvelteKit Node server
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffer_size       128k;
        proxy_buffers           4 256k;
        proxy_busy_buffers_size 256k;
    }
}
