services:
  couchdb:
    container_name: tent-couchdb-production
    image: couchdb:3.5
    environment:
      COUCHDB_USER: ${COUCHDB_USER}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD}
    volumes:
      - ../deployment/tent/data:/opt/couchdb/data
    # No port binding — reachable only inside Docker network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5984/_up"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  mongodb:
    container_name: tent-mongodb-production
    image: mongo:7
    volumes:
      - ../deployment/tent/mongodb/data:/data/db
    # No port binding — reachable only inside Docker network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  worker:
    container_name: tent-worker-production
    build:
      context: .
      dockerfile: worker/Dockerfile
    depends_on:
      couchdb:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      COUCHDB_URL: http://couchdb:5984
      COUCHDB_USER: ${COUCHDB_USER}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD}
      DATABASE_URI: ${DATABASE_URI:-mongodb://mongodb:27017/tentdb}
    restart: unless-stopped

  fastapi:
    container_name: tent-fastapi-production
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      APP_ENV: prod
      DATABASE_URI: ${DATABASE_URI:-mongodb://mongodb:27017/tentdb}
      SECRET_KEY: ${SECRET_KEY}
      EXTERNAL_API_SECRET: ${EXTERNAL_API_SECRET}
    # No port binding — reachable only inside Docker network (nginx proxies)
    restart: unless-stopped

  frontend:
    container_name: tent-frontend-production
    image: tent/frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        PUBLIC_APP_TITLE: ${PUBLIC_APP_TITLE:-Tent}
        PUBLIC_COUCHDB_URL: ${PUBLIC_ORIGIN:-http://localhost}
        PUBLIC_COUCH_PROXY: /couch
    environment:
      # adapter-node requires ORIGIN in production
      ORIGIN: ${PUBLIC_ORIGIN:-http://localhost}
      # Server-only — never bundled into the browser
      COUCHDB_ADMIN_URL: http://${COUCHDB_USER}:${COUCHDB_PASSWORD}@couchdb:5984
      # BFF donations/needs → FastAPI on the compose network (not localhost)
      FASTAPI_INTERNAL_URL: http://fastapi:9000
      EXTERNAL_API_SECRET: ${EXTERNAL_API_SECRET}
      SECRET_RECAPTCHA_KEY: ${SECRET_RECAPTCHA_KEY}
    depends_on:
      couchdb:
        condition: service_healthy
      fastapi:
        condition: service_started
    restart: unless-stopped

  nginx:
    container_name: tent-nginx-production
    image: nginx:alpine
    ports:
      - "${NGINX_HOST:-127.0.0.1}:${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
    depends_on:
      - frontend
      - couchdb
      - fastapi
    restart: unless-stopped
