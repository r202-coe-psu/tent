[project]
name = "tent-public-read-model"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "beanie>=1.26,<2",
    "motor>=3.0",
    "pydantic>=2.0",
    "pymongo>=4.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tent_read_model", "src/tent_donation"]
