# Pre-commit quality gate for frontend (matches Jenkins CI stages).
# Install: pnpm install (root) — runs `lefthook install` via prepare script.

pre-commit:
  parallel: true
  commands:
    frontend-lint:
      root: frontend/
      glob: "*.{js,ts,svelte,css,json,md}"
      run: pnpm exec prettier --check {staged_files} && pnpm exec eslint {staged_files}
    frontend-check:
      root: frontend/
      glob: "**/*"
      run: pnpm check
    frontend-test:
      root: frontend/
      glob: "**/*"
      run: pnpm test
