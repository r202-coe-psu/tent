# Pre-commit quality gate (frontend + backend).
# Install: pnpm install (root) — runs `lefthook install` via prepare script.

pre-commit:
  parallel: true
  commands:
    frontend-lint:
      root: frontend/
      glob: '**/*'
      run: pnpm lint
    frontend-check:
      root: frontend/
      glob: '**/*'
      run: pnpm check
    frontend-test:
      root: frontend/
      glob: '**/*'
      run: pnpm test
    backend-check:
      root: backend/
      glob: '**/*.py'
      run: poetry run ruff check . && poetry run ruff format --check .
    backend-test:
      root: backend/
      glob: '**/*.py'
      run: poetry run pytest
