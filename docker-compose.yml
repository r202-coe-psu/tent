services:
  couchdb:
    container_name: couchdb
    image: couchdb:3.5
    environment:
      COUCHDB_USER: ${COUCHDB_USER:-admin}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD:-password}
    ports:
      - "5984:5984"
    volumes:
      - ../deployment/couchdb/data:/opt/couchdb/data
      - ./couchdb-session.ini:/opt/couchdb/etc/local.d/session.ini
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5984/_up"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  couchdb-init:
    image: curlimages/curl:latest
    depends_on:
      couchdb:
        condition: service_healthy
    environment:
      COUCHDB_USER: ${COUCHDB_USER:-admin}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD:-password}
    restart: "no"
    command:
      - sh
      - -c
      - |
        set -e
        CODE=$$(curl -s -o /tmp/couch-init.out -w '%{http_code}' -X POST \
          "http://$${COUCHDB_USER}:$${COUCHDB_PASSWORD}@couchdb:5984/_cluster_setup" \
          -H "Content-Type: application/json" \
          -d "{\"action\":\"enable_single_node\",\"bind_address\":\"0.0.0.0\",\"username\":\"$${COUCHDB_USER}\",\"password\":\"$${COUCHDB_PASSWORD}\",\"port\":5984}")
        cat /tmp/couch-init.out || true
        case "$$CODE" in
          200|201) echo "CouchDB single-node setup OK" ;;
          400) echo "CouchDB already set up (HTTP 400) — skipping" ;;
          *) echo "CouchDB cluster setup failed (HTTP $$CODE)"; exit 1 ;;
        esac

  mongodb:
    container_name: tent-mongodb
    image: mongo:7
    # Dev only — no auth; do not expose host port in production (staging uses internal network).
    ports:
      - "27017:27017"
    volumes:
      - ./deployment/mongodb/data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: sync-worker
    depends_on:
      couchdb:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      COUCHDB_URL: http://couchdb:5984
      COUCHDB_USER: ${COUCHDB_USER:-admin}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD:-password}
      DATABASE_URI: ${DATABASE_URI:-mongodb://mongodb:27017/tentdb}
    restart: unless-stopped

  fastapi:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tent-fastapi
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      APP_ENV: dev
      DATABASE_URI: ${DATABASE_URI:-mongodb://mongodb:27017/tentdb}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      EXTERNAL_API_SECRET: ${EXTERNAL_API_SECRET:-dev-external-secret}
    ports:
      - "9000:9000"
    restart: unless-stopped

networks:
  default:
