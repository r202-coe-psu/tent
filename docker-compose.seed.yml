services:
  couchdb-init:
    container_name: tent-couchdb-init
    image: curlimages/curl:latest
    environment:
      COUCHDB_USER: ${COUCHDB_USER}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD}
      COUCHDB_HOST: ${COUCHDB_HOST:-couchdb}
      COUCHDB_PORT: ${COUCHDB_PORT:-5984}
    restart: on-failure
    entrypoint: ["sh", "-c"]
    command:
      - "curl -sf -X POST http://$${COUCHDB_USER}:$${COUCHDB_PASSWORD}@$${COUCHDB_HOST}:$${COUCHDB_PORT}/_cluster_setup -H 'Content-Type: application/json' -d '{\"action\":\"enable_single_node\",\"bind_address\":\"0.0.0.0\",\"username\":\"$${COUCHDB_USER}\",\"password\":\"$${COUCHDB_PASSWORD}\",\"port\":$${COUCHDB_PORT}}'"

  seed:
    container_name: tent-seed
    image: node:24-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
    environment:
      COUCHDB_ADMIN_URL: http://${COUCHDB_USER}:${COUCHDB_PASSWORD}@${COUCHDB_HOST:-couchdb}:${COUCHDB_PORT:-5984}
    depends_on:
      couchdb-init:
        condition: service_completed_successfully
    command: sh -c "corepack enable && pnpm seed"
